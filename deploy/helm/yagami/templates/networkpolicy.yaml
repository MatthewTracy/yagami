{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yagami.fullname" . }}
  labels:
    {{- include "yagami.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "yagami.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: 8000
{{- end }}

# Yagami model registry + routing rules

[ollama]
url = "http://localhost:11434"
model = "llama3.2:3b-instruct-q4_K_M"
# Dedicated classifier - phi4-mini is purpose-trained for structured (JSON)
# output and consistently outperforms llama3.2:3b on the routing eval.
classifier_model = "phi4-mini"

[anthropic]
model = "claude-sonnet-4-6"
max_tokens = 4096

[stability]
model = "stable-image-core"

# Optional policy-only upstream. This lets Yagami enforce privacy and tool
# policy in front of LiteLLM, Portkey, Kong, Envoy, or another compatible API.
[upstream]
enabled = false
base_url = "http://localhost:4000/v1"
model = ""
max_tokens = 4096
api_key_env = "UPSTREAM_API_KEY"
allow_unauthenticated = false

# Optional Microsoft Foundry Local generation backend. Run
# `foundry service status` for the current endpoint; its port can change after
# a restart. Yagami accepts loopback URLs only because this is a trusted-local
# route. The CLI and model installation remain user-managed.
[foundry_local]
enabled = false
base_url = ""
model = "qwen2.5-0.5b-instruct-generic-cpu"
max_tokens = 4096

[routing]
long_message_token_threshold = 1500
phi_must_be_local = true
default_backend = "ollama"
# Daily cap on cloud spend in USD. Cloud routing is refused once exceeded
# during the current local calendar day. Set to 0 to disable.
daily_spend_cap_usd = 5.0
# Privacy classifier failures fall back to local and refuse explicit cloud routes.
fail_closed_on_classifier_error = true

[privacy]
# 0 keeps conversations until manually deleted. Positive values delete stale
# sessions and their derived cross-session memories together.
session_retention_days = 0

[routing.lora_variants]
# PHI-medical now uses a per-request system prompt (router/prompts.py) - no
# named variant needed. Uncomment after building any future LoRA-backed variants
# with `ollama create <name> -f config/Modelfile.<x>`.
# code = "yagami-code"

[routing.local_model_overrides]
# Phi-4 Mini is less likely than the small general generator to refuse an
# authorized administrative task merely because it contains private data.
phi = "phi4-mini"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests scripts evals
      - name: Format check (ruff)
        run: ruff format --check src tests scripts evals
      - name: Type check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: mypy src/yagami
      - name: Check release metadata
        run: python scripts/check_release.py
      - name: Test default policy
        run: yagami policy test --policy config/policy.yaml --cases config/policy-tests.yaml
      - name: Test
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.12'
        run: pytest -q
      - name: Test with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pytest -q --cov=yagami --cov-report=term-missing --cov-fail-under=80
      - name: Verify installed dependencies
        run: pip check
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build bundled control surface
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: Build wheel
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pip wheel . --no-deps --wheel-dir dist
      - name: Audit Python dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pip install pip-audit==2.10.1
          pip-audit --requirement requirements.container.lock

  ui:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  container:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: yagami:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Lint Helm chart
        run: helm lint deploy/helm/yagami --strict
      - name: Render secure defaults
        run: helm template test deploy/helm/yagami > /dev/null

name: Bug report
description: Something in Yagami isn't working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. If this is a **security** issue (e.g.
        PHI/secret content leaking off-device, a routing bypass), please use
        [private vulnerability reporting](https://github.com/MatthewTracy/yagami/security/advisories/new)
        instead of filing a public issue — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact prompt/slash command/action, if applicable.
      placeholder: |
        1. Send message "..."
        2. Expected route: ...
        3. Actual route: ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.x / 3.12.x"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "20.x"
    validations:
      required: false
  - type: input
    id: ollama-version
    attributes:
      label: Ollama version (if relevant)
      placeholder: "output of `ollama --version`"
    validations:
      required: false
  - type: input
    id: backend
    attributes:
      label: Backend(s) involved
      placeholder: "ollama / anthropic / openai / stability / llama_cpp"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / Privacy Ledger entry
      description: >
        Paste the uvicorn console output or the relevant Privacy Ledger row.
        Please scrub anything sensitive first — the ledger scrubs SSN/credit
        card/email/phone patterns automatically, but double-check before
        pasting.
      render: shell
